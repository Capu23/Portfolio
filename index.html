<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Portfolio · CEDEARs</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a12;--bg2:#111120;--bg3:#16162a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#e8e8f0;--text2:#9090b0;--text3:#55557a;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --nvda:#76b900;--googl:#4285f4;--cvx:#f59e0b;
  --accent:#7c6dfa;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.mono{font-family:'JetBrains Mono',monospace}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.nav-title{font-size:15px;font-weight:700;letter-spacing:-.02em}
.nav-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.status-badge{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:5px 10px;cursor:pointer;user-select:none}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0;transition:background .3s}
.status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.err{background:var(--red)}
.status-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}

/* TICKER */
#tv-ticker{flex-shrink:0;height:44px;overflow:hidden;border-bottom:1px solid var(--border)}

/* SCROLL BODY */
.body{flex:1;overflow-y:auto;padding-bottom:72px}

/* HERO */
.hero{padding:20px 16px 16px;background:linear-gradient(160deg,rgba(124,109,250,.08) 0%,transparent 60%)}
.hero-label{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.hero-val{font-size:38px;font-weight:700;letter-spacing:-.03em;line-height:1}
.hero-val.hidden-val::after{content:'••••••';font-size:28px;letter-spacing:.1em}
.hero-sub{font-size:12px;color:var(--text2);margin-top:5px;font-family:'JetBrains Mono',monospace}
.hero-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.hero-chip{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;flex:1;min-width:80px}
.hero-chip-label{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.hero-chip-val{font-size:15px;font-weight:600;font-family:'JetBrains Mono',monospace}
.cur-toggle{display:flex;gap:4px;margin-top:12px}
.cur-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.cur-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.eye-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:5px;font-size:11px;font-family:'JetBrains Mono',monospace}

/* SECTION */
.section{padding:20px 16px 0}
.section-title{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px}

/* ASSET CARD */
.asset-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.asset-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.asset-ticker{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.asset-name{font-size:10px;color:var(--text3);margin-top:2px}
.asset-price{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:right}
.asset-chg{font-size:11px;font-family:'JetBrains Mono',monospace;text-align:right;margin-top:2px}
.asset-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:10px;border-top:1px solid var(--border)}
.asset-stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.asset-stat-val{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace}
.asset-val-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.asset-val-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.asset-val-num{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.asset-pnl{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600}

/* RENDIMIENTO */
.perf-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.perf-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.perf-row:last-child{border-bottom:none}
.perf-label{font-size:12px;font-weight:600}
.perf-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.perf-right{text-align:right}
.perf-pct{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
.perf-val{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:2px}

/* BOTTOM TAB */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,10,18,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 14px;cursor:pointer;gap:4px;color:var(--text3);transition:color .15s}
.tab.active{color:var(--accent)}
.tab-label{font-size:10px;font-weight:600;letter-spacing:.03em}

/* MODAL */
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal-sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:18px}
.input-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.input-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;width:52px;flex-shrink:0}
.input-field{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text);outline:none}
.input-field:focus{border-color:var(--accent)}
.btn-confirm{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-cancel{width:100%;background:transparent;color:var(--text3);border:none;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;margin-top:4px}

/* UTILS */
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text2)}
.pb{padding-bottom:8px}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <div>
    <div class="nav-title">Mi Portfolio</div>
    <div class="nav-sub mono">CEDEARs · BYMA</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="eye-btn" id="eye-btn" onclick="toggleHide()">
      <svg id="eye-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <div class="status-badge" onclick="manualRefresh()">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-txt mono" id="status-txt">Conectando...</span>
    </div>
  </div>
</div>

<!-- TRADINGVIEW TICKER -->
<div id="tv-ticker">
  <div class="tradingview-widget-container" style="height:44px">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {"symbols":[{"proName":"NASDAQ:NVDA","title":"NVDA"},{"proName":"NASDAQ:GOOGL","title":"GOOGL"},{"proName":"NYSE:CVX","title":"CVX"},{"proName":"BCBA:NVDA","title":"NVDA AR"},{"proName":"BCBA:GOOGL","title":"GOOGL AR"},{"proName":"BCBA:CVX","title":"CVX AR"}],"showSymbolLogo":false,"isTransparent":true,"displayMode":"compact","colorTheme":"dark","locale":"es"}
    </script>
  </div>
</div>

<!-- BODY -->
<div class="body">

  <!-- OVERVIEW -->
  <div id="sec-overview">
    <div class="hero">
      <div class="hero-label">Valor total</div>
      <div class="hero-val" id="hero-total">—</div>
      <div class="hero-sub mono" id="hero-sub">calculando...</div>
      <div class="hero-row">
        <div class="hero-chip">
          <div class="hero-chip-label">MEP</div>
          <div class="hero-chip-val amb" id="hero-mep">$1.406</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-label">Ret. Q1</div>
          <div class="hero-chip-val" id="hero-q1">—</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-label">Acumulado</div>
          <div class="hero-chip-val" id="hero-acum">—</div>
        </div>
      </div>
      <div class="cur-toggle">
        <button class="cur-btn active" onclick="setCur('USD')">USD</button>
        <button class="cur-btn" onclick="setCur('ARS')">ARS</button>
        <button class="eye-btn" onclick="document.getElementById('modal-override').classList.add('open')" style="flex:0;padding:8px 14px;font-size:11px">↺ precios</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Resumen</div>
      <div id="overview-cards"></div>
      <div class="pb"></div>
    </div>
  </div>

  <!-- POSICIONES -->
  <div id="sec-posiciones" style="display:none">
    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-title" style="margin-bottom:0">Posiciones</div>
        <div class="mono" style="font-size:10px;color:var(--text3)" id="pos-fecha">13/04/2026</div>
      </div>
      <div id="pos-cards"></div>
      <div class="pb"></div>
    </div>
  </div>

  <!-- RENDIMIENTO -->
  <div id="sec-rendimiento" style="display:none">
    <div class="section">
      <div class="section-title">Rendimiento</div>
      <div class="perf-card" id="perf-cards"></div>
      <div class="pb"></div>
    </div>
  </div>

</div><!-- /body -->

<!-- BOTTOM TABS -->
<div class="tab-bar">
  <div class="tab active" id="tab-overview" onclick="showTab('overview')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="tab-label">Overview</span>
  </div>
  <div class="tab" id="tab-posiciones" onclick="showTab('posiciones')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
    <span class="tab-label">Posiciones</span>
  </div>
  <div class="tab" id="tab-rendimiento" onclick="showTab('rendimiento')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="tab-label">Rendimiento</span>
  </div>
</div>

<!-- MODAL OVERRIDE -->
<div class="modal" id="modal-override" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Override manual</div>
    <div class="modal-sub">Ingresá el precio que ves en TradingView (USD)</div>
    <div class="input-row">
      <div class="input-label" style="color:var(--nvda)">NVDA</div>
      <input class="input-field" id="in-nvda" type="number" step="0.01" placeholder="185.95">
    </div>
    <div class="input-row">
      <div class="input-label" style="color:var(--googl)">GOOGL</div>
      <input class="input-field" id="in-googl" type="number" step="0.01" placeholder="313.63">
    </div>
    <div class="input-row">
      <div class="input-label" style="color:var(--cvx)">CVX</div>
      <input class="input-field" id="in-cvx" type="number" step="0.01" placeholder="192.39">
    </div>
    <div class="input-row" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <div class="input-label" style="color:var(--amber)">MEP $</div>
      <input class="input-field" id="in-mep" type="number" step="1" placeholder="1406">
    </div>
    <button class="btn-confirm" onclick="applyOverride()">Aplicar</button>
    <button class="btn-cancel" onclick="document.getElementById('modal-override').classList.remove('open')">Cancelar</button>
  </div>
</div>

<script>
// ── DATOS ──────────────────────────────────────────────────────────────────
let MEP = 1406;
const snapLabels = ['31/12','31/01','28/02','31/03','Hoy'];
const meps       = [1480,   1460,   1440,   1420,   1406];

const assets = [
  { ticker:'NVDA',  name:'Nvidia Corp.',  cant:250,  ratio:24, compraUSD:8.70,  compraMEP:1070, color:'var(--nvda)',
    prices:[186.50,191.13,186.94,167.75,185.95] },
  { ticker:'GOOGL', name:'Alphabet Inc.', cant:1022, ratio:58, compraUSD:5.41,  compraMEP:1095, color:'var(--googl)',
    prices:[313.80,338.53,311.43,303.00,313.63] },
  { ticker:'CVX',   name:'Chevron Corp.', cant:140,  ratio:16, compraARS:9910,  color:'var(--cvx)',
    prices:[152.41,176.90,186.76,211.15,192.39] },
];

let cur    = 'USD';
let hidden = false;
const MASK = '••••••';

// ── HELPERS ────────────────────────────────────────────────────────────────
const fU = v => { const a=Math.abs(v); const s=a>=1e6?'$'+(a/1e6).toFixed(2)+'M':a>=1000?'$'+(a/1000).toFixed(1)+'k':'$'+a.toFixed(2); return (v<0?'-':'')+s+' USD'; };
const fA = v => { const a=Math.abs(v); const s=a>=1e6?'$'+(a/1e6).toFixed(2)+'M':'$'+Math.round(a).toLocaleString('es-AR'); return (v<0?'-':'')+s; };
const fmt = (v,usd=true) => hidden ? MASK : (cur==='USD'||usd ? fU(v) : fA(v));
const fmtCur = v => hidden ? MASK : (cur==='USD' ? fU(v) : fA(v*MEP));
const fPct = v => (v>=0?'+':'')+v.toFixed(2)+'%';
const cls  = v => v>=0?'pos':'neg';

function vUSD(a,i){ return (a.prices[i]/a.ratio)*a.cant; }
function totUSD(i){ return assets.reduce((s,a)=>s+vUSD(a,i),0); }
function costUSD(a){
  if(a.compraUSD) return a.compraUSD * a.cant / a.ratio;
  return (a.compraARS / (a.compraMEP||meps[0])) * a.cant / a.ratio;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderAll(){
  renderHero();
  renderOverviewCards();
  renderPosCards();
  renderPerf();
}

function renderHero(){
  const t4 = totUSD(4);
  const t0 = totUSD(0);
  const pct = (t4-t0)/t0*100;
  const el = document.getElementById('hero-total');
  if(hidden){ el.textContent=''; el.classList.add('hidden-val'); }
  else { el.classList.remove('hidden-val'); el.textContent = cur==='USD' ? fU(t4) : fA(t4*MEP); }
  document.getElementById('hero-sub').textContent = hidden ? '••••' : `${fPct(pct)} desde dic 2025`;
  document.getElementById('hero-mep').textContent = hidden ? MASK : `$${MEP.toLocaleString('es-AR')}`;
  // Q1 31/12→31/03
  const q1 = (totUSD(3)-totUSD(0))/totUSD(0)*100;
  const q1el = document.getElementById('hero-q1');
  q1el.textContent = hidden ? MASK : fPct(q1);
  q1el.className = 'hero-chip-val '+(q1>=0?'pos':'neg');
  // Acumulado
  const acumEl = document.getElementById('hero-acum');
  acumEl.textContent = hidden ? MASK : fPct(pct);
  acumEl.className = 'hero-chip-val '+(pct>=0?'pos':'neg');
}

function renderOverviewCards(){
  const el = document.getElementById('overview-cards');
  el.innerHTML = assets.map(a=>{
    const val = vUSD(a,4);
    const cost = costUSD(a);
    const pnl = val - cost;
    const pct = (val-cost)/cost*100;
    return `<div class="asset-card" style="border-color:${a.color}33">
      <div class="asset-top">
        <div>
          <div class="asset-ticker" style="color:${a.color}">${a.ticker}</div>
          <div class="asset-name">${a.name}</div>
        </div>
        <div>
          <div class="asset-price mono" style="color:${a.color}">${hidden?MASK:'$'+a.prices[4].toFixed(2)}</div>
          <div class="asset-chg ${cls(pct)}">${hidden?MASK:fPct(pct)} PnL</div>
        </div>
      </div>
      <div class="asset-val-row">
        <div>
          <div class="asset-val-label">Valor posición</div>
          <div class="asset-val-num">${hidden?MASK:(cur==='USD'?fU(val):fA(val*MEP))}</div>
        </div>
        <div style="text-align:right">
          <div class="asset-val-label">PnL</div>
          <div class="asset-pnl ${cls(pnl)}">${hidden?MASK:(cur==='USD'?fU(pnl):fA(pnl*MEP))}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderPosCards(){
  const el = document.getElementById('pos-cards');
  el.innerHTML = assets.map(a=>{
    const shares = (a.cant/a.ratio).toFixed(4);
    const val = vUSD(a,4);
    const cost = costUSD(a);
    const pnl = val-cost;
    const pct = (val-cost)/cost*100;
    const compraStr = a.compraUSD
      ? `U$S ${a.compraUSD.toFixed(2)} c/CEDEAR`
      : `$${a.compraARS.toLocaleString('es-AR')} c/CEDEAR`;
    return `<div class="asset-card" style="border-color:${a.color}44">
      <div class="asset-top">
        <div>
          <div class="asset-ticker" style="color:${a.color}">${a.ticker}</div>
          <div class="asset-name">${a.name}</div>
        </div>
        <div>
          <div class="asset-price mono" style="color:${a.color}">${hidden?MASK:'$'+a.prices[4].toFixed(2)}</div>
          <div class="asset-chg">NYSE · USD</div>
        </div>
      </div>
      <div class="asset-grid">
        <div><div class="asset-stat-label">CEDEARs</div><div class="asset-stat-val">${a.cant}</div></div>
        <div><div class="asset-stat-label">Ratio</div><div class="asset-stat-val">${a.ratio}:1</div></div>
        <div><div class="asset-stat-label">Acciones</div><div class="asset-stat-val">${shares}</div></div>
        <div><div class="asset-stat-label">Compra</div><div class="asset-stat-val" style="font-size:11px">${compraStr}</div></div>
        <div><div class="asset-stat-label">Valor</div><div class="asset-stat-val" style="font-size:11px">${hidden?MASK:(cur==='USD'?fU(val):fA(val*MEP))}</div></div>
        <div><div class="asset-stat-label">PnL</div><div class="asset-stat-val ${cls(pnl)}" style="font-size:11px">${hidden?MASK:fPct(pct)}</div></div>
      </div>
    </div>`;
  }).join('');
}

function renderPerf(){
  const periods = [
    {label:'Enero',      sub:'31/12→31/01', ini:0, fin:1},
    {label:'Febrero',    sub:'31/01→28/02', ini:1, fin:2},
    {label:'Marzo',      sub:'28/02→31/03', ini:2, fin:3},
    {label:'Abr parcial',sub:'31/03→hoy',   ini:3, fin:4},
    {label:'Q1 2026',    sub:'31/12→31/03', ini:0, fin:3, bold:true},
    {label:'Acumulado',  sub:'31/12→hoy',   ini:0, fin:4, bold:true},
  ];
  const el = document.getElementById('perf-cards');
  el.innerHTML = periods.map(p=>{
    const ini = totUSD(p.ini), fin = totUSD(p.fin);
    const pct = (fin-ini)/ini*100;
    const diff = fin-ini;
    return `<div class="perf-row" style="${p.bold?'background:rgba(124,109,250,.05);padding:10px 6px;border-radius:8px;':''}">
      <div>
        <div class="perf-label" style="${p.bold?'color:var(--text)':'color:var(--text2)'}">${p.label}</div>
        <div class="perf-sub">${p.sub}</div>
      </div>
      <div class="perf-right">
        <div class="perf-pct ${cls(pct)}">${hidden?MASK:fPct(pct)}</div>
        <div class="perf-val">${hidden?MASK:(cur==='USD'?fU(diff):fA(diff*MEP))}</div>
      </div>
    </div>`;
  }).join('');
}

// ── UI CONTROLS ────────────────────────────────────────────────────────────

  ['overview','posiciones','rendimiento'].forEach(t=>{
    document.getElementById('sec-'+t).style.display = t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);

}

function setCur(c){
  cur=c;
  document.querySelectorAll('.cur-btn').forEach(b=>b.classList.toggle('active',b.textContent===c));

function applyOverride(){
  const n  = parseFloat(document.getElementById('in-nvda').value);
  const g  = parseFloat(document.getElementById('in-googl').value);
  const c  = parseFloat(document.getElementById('in-cvx').value);
  const m  = parseFloat(document.getElementById('in-mep').value);
  if(!isNaN(n)) assets[0].prices[4]=n;
  if(!isNaN(g)) assets[1].prices[4]=g;

  renderAll();
}

// ── API: FINNHUB WEBSOCKET + REST ──────────────────────────────────────────
const FH_KEY  = 'd7en9fpr01qi33g6v7b0d7en9fpr01qi33g6v7bg';
const FH_SYMS = ['NVDA','GOOGL','CVX'];
let ws = null;

function setStatus(state, msg){
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  dot.className = 'status-dot ' + state;
  txt.textContent = msg;
}

function connectWS(){
  if(ws){ ws.close(); ws=null; }
  setStatus('', 'Conectando WS...');
  ws = new WebSocket('wss://ws.finnhub.io?token=' + FH_KEY);
  ws.onopen = () => {
    FH_SYMS.forEach(s => ws.send(JSON.stringify({type:'subscribe', symbol:s})));
    setStatus('ok', 'Live · WS activo');
  };
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if(msg.type !== 'trade' || !msg.data) return;
      let changed = false;
      msg.data.forEach(t => {
        const idx = assets.findIndex(a => a.ticker === t.s);
        if(idx >= 0 && t.p){ assets[idx].prices[4] = t.p; changed = true; }
      });
      if(changed){
        const time = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
        setStatus('ok', `Live · ${time}`);
        renderAll();
      }
    } catch(e){}
  };
  ws.onerror = () => setStatus('err', 'Error WS');
  ws.onclose = () => {
    setStatus('err', 'WS caído · reconectando...');
    setTimeout(connectWS, 5000);
  };
}

async function fetchREST(){
  try {
    const results = await Promise.all(
      FH_SYMS.map(s =>
        fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${FH_KEY}`,{signal:AbortSignal.timeout(8000)})
          .then(r=>r.json())
          .then(d=>({s, price: d.c || d.pc}))
          .catch(()=>({s, price:null}))
      )
    );
    let ok = false;
    results.forEach(r => {
      if(!r.price) return;
      const idx = assets.findIndex(a => a.ticker === r.s);
      if(idx >= 0){ assets[idx].prices[4] = r.price; ok = true; }
    });
    if(ok){
      const time = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
      setStatus('ok', `Finnhub · ${time}`);
      renderAll();
    } else {
      setStatus('err', 'Sin datos REST');
    }
  } catch(e){
    setStatus('err', 'Error REST');
  }
}

async function fetchMEP(){
  try {
    const r = await fetch('https://dolarapi.com/v1/dolares/bolsa',{signal:AbortSignal.timeout(8000)});
    const d = await r.json();
    if(d?.venta){
      MEP = Math.round((d.compra + d.venta) / 2);
      meps[4] = MEP;
      document.getElementById('hero-mep').textContent = `$${MEP.toLocaleString('es-AR')}`;
    }
  } catch(e){}
}

function manualRefresh(){
  fetchREST();
  fetchMEP();
}

// ── INIT ───────────────────────────────────────────────────────────────────
renderAll();
fetchREST();
fetchMEP();
connectWS();
setInterval(fetchREST, 300000);
setInterval(fetchMEP, 300000);
</script>
